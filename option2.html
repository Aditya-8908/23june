  <script>
    // Timer showing elapsed time since June 23, 2025
    const target = new Date(2025, 5, 23, 0, 0, 0); // months are 0-indexed
    function updateTimer(){
      const now = new Date();
      let diff = Math.max(0, now - target);
      const days = Math.floor(diff / (1000*60*60*24));
      diff -= days * (1000*60*60*24);
      const hours = Math.floor(diff / (1000*60*60));
      diff -= hours * (1000*60*60);
      const minutes = Math.floor(diff / (1000*60));
      diff -= minutes * (1000*60);
      const seconds = Math.floor(diff/1000);
      document.getElementById('timer').textContent = `${days}d ${hours}h ${minutes}m ${seconds}s since June 23, 2025`;
    }
    updateTimer();
    setInterval(updateTimer,1000);

    // Falling roses (increased density)
    function createRose(){
      const el = document.createElement('div');
      el.className = 'rose';
      el.textContent = '🌹';
      el.style.left = Math.random()*100 + 'vw';
      el.style.fontSize = (16 + Math.random()*44) + 'px';
      el.style.animationDuration = (5 + Math.random()*6) + 's';
      document.body.appendChild(el);
      // remove after animation
      setTimeout(()=> el.remove(), 14000);
    }
    // spawn roses more frequently for a denser effect
    setInterval(createRose, 120);
  </script>
